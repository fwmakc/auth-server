name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: "1234"
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Checkout shared (@core/common)
        uses: actions/checkout@v4
        with:
          repository: fwmakc/shared
          path: shared-src

      - name: Build @core/common tarball
        run: |
          cd shared-src
          npm install
          npm run build
          npm pack
          cd ..
          mkdir -p ../shared
          cp shared-src/core-common-1.0.0.tgz ../shared/

      - name: Strip @core/common integrity hash
        run: |
          node -e "const fs=require('fs'),p='package-lock.json',l=JSON.parse(fs.readFileSync(p));if(l.packages&&l.packages['node_modules/@core/common'])delete l.packages['node_modules/@core/common'].integrity;fs.writeFileSync(p,JSON.stringify(l,null,2))"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Create test database
        run: |
          PGPASSWORD=1234 psql -h localhost -U root -d postgres -c "CREATE DATABASE auth_server_test;"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
